<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0E1E35;
  --navy-mid: #1B3252;
  --ink: #1A2638;
  --slate: #4A5C70;
  --mist: #8A9BAD;
  --border: #D8E2EC;
  --bg: #D4DAE3;
  --white: #FFFFFF;
  --accent: #1D6FA4;
  --accent-light: #E8F3FB;
  --green: #1A7F5A;
  --green-light: #E6F6EF;
  --red: #A32D2D;
  --red-light: #FCEBEB;
  --amber: #92520C;
  --amber-light: #FDF3E3;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); line-height: 1.6; font-size: 16px; -webkit-font-smoothing: antialiased; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(235,238,242,0.97); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-mark {
  width: 34px; height: 34px; background: var(--navy); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; position: relative;
}
.logo-text { font-family: var(--sans); font-weight: 600; font-size: 17px; color: var(--navy); letter-spacing: -0.3px; }
.logo-text span { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-pill {
  background: white; border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 14px; font-size: 13px; color: var(--slate); font-weight: 500;
  display: flex; align-items: center; gap: 6px;
}
.usage-dot { width: 6px; height: 6px; border-radius: 50%; }
.nav-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 7px;
  padding: 6px 14px; font-family: var(--sans); font-size: 13px; font-weight: 500;
  color: var(--slate); cursor: pointer; transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--slate); color: var(--navy); }
.nav-btn-primary {
  background: var(--navy); color: white; border: none;
  padding: 7px 16px; border-radius: 7px; font-family: var(--sans);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s;
}
.nav-btn-primary:hover { background: var(--navy-mid); }
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--accent); color: white; border: none;
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  cursor: pointer; position: relative;
}
.dropdown {
  position: absolute; top: 46px; right: 0;
  background: white; border: 1px solid var(--border); border-radius: 12px;
  min-width: 220px; box-shadow: 0 20px 50px rgba(14,30,53,0.12);
  z-index: 200; overflow: hidden;
}
.dropdown-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.dropdown-name { font-size: 14px; font-weight: 600; color: var(--navy); }
.dropdown-email { font-size: 12px; color: var(--mist); margin-top: 2px; }
.dropdown-plan { font-size: 11px; background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 6px; font-weight: 500; }
.dropdown-item { width: 100%; background: none; border: none; text-align: left; padding: 10px 16px; font-family: var(--sans); font-size: 13px; color: var(--slate); cursor: pointer; transition: background 0.15s; }
.dropdown-item:hover { background: var(--bg); color: var(--navy); }

/* AUTH */
.auth-wrap { min-height: 100vh; display: grid; grid-template-columns: 1.1fr 1fr; }
@media(max-width:800px) { .auth-wrap { grid-template-columns: 1fr; } .auth-brand-panel { display: none; } }
.auth-brand-panel {
  background: var(--navy);
  padding: 60px 52px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}
.auth-brand-panel::before {
  content: '';
  position: absolute; top: -30%; right: -20%;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(29,111,164,0.25) 0, transparent 70%);
}
.auth-brand-top { position: relative; z-index: 1; }
.auth-brand-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 60px; }
.auth-brand-mark { width: 42px; height: 42px; background: rgba(255,255,255,0.12); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.15); }
.auth-brand-name { font-family: var(--sans); font-size: 20px; font-weight: 600; color: white; letter-spacing: -0.3px; }
.auth-brand-name span { color: #7EC8F0; }
.auth-tagline { font-family: var(--serif); font-size: clamp(32px, 3vw, 44px); color: white; line-height: 1.1; margin-bottom: 20px; letter-spacing: -0.5px; }
.auth-tagline em { font-style: italic; color: #7EC8F0; }
.auth-tagline-sub { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.6; font-weight: 300; max-width: 340px; }
.auth-features { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 12px; }
.auth-feature { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; }
.auth-feature-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.auth-feature-text strong { display: block; font-size: 13px; font-weight: 600; color: white; margin-bottom: 2px; }
.auth-feature-text span { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.4; }
.auth-form-panel { background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 60px 52px; }
@media(max-width:800px) { .auth-form-panel { padding: 80px 24px 40px; } }
.auth-box { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(14,30,53,0.08); }
.auth-logo-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.auth-logo-mark { width: 40px; height: 40px; background: var(--navy); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.auth-brand { font-family: var(--sans); font-size: 20px; font-weight: 600; color: var(--navy); }
.auth-brand span { color: var(--accent); }
.auth-tabs { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 28px; }
.auth-tab { flex: 1; padding: 8px; border: none; background: transparent; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--slate); cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.auth-tab.active { background: white; color: var(--navy); box-shadow: 0 1px 4px rgba(14,30,53,0.08); }
.auth-title { font-family: var(--serif); font-size: 26px; color: var(--navy); margin-bottom: 6px; }
.auth-sub { font-size: 14px; color: var(--slate); margin-bottom: 24px; font-weight: 300; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--slate); margin-bottom: 6px; }
.field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 15px; color: var(--ink); background: white; outline: none; transition: border-color 0.2s; }
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--mist); }
.btn-full { width: 100%; padding: 13px; background: var(--navy); color: white; border: none; border-radius: 8px; font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
.btn-full:hover { background: var(--navy-mid); }
.auth-switch { text-align: center; font-size: 13px; color: var(--mist); margin-top: 16px; }
.auth-switch a { color: var(--accent); cursor: pointer; font-weight: 500; }
.auth-err { background: var(--red-light); border: 1px solid #F09595; border-radius: 7px; padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 14px; }

/* MAIN APP */
.app-wrap { padding-top: 60px; min-height: 100vh; }
.app-main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

/* SECTIONS */
.section-top { margin-bottom: 32px; }
.page-title { font-family: var(--serif); font-size: clamp(26px, 3.5vw, 36px); color: var(--navy); margin-bottom: 6px; }
.page-sub { font-size: 15px; color: var(--slate); font-weight: 300; }

/* CARD */
.card { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
.card-section { padding: 24px 28px; }
.card-section + .card-section { border-top: 1px solid var(--border); }
.card-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--mist); margin-bottom: 14px; }

/* MODE TABS */
.mode-tabs { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); padding: 3px; border-radius: 10px; width: fit-content; margin-bottom: 20px; }
.mode-tab { padding: 8px 16px; border: none; background: transparent; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--slate); border-radius: 7px; cursor: pointer; transition: all 0.2s; }
.mode-tab.active { background: white; color: var(--navy); box-shadow: 0 1px 4px rgba(14,30,53,0.08); border: 1px solid var(--border); }

/* SELECTS */
.select-group { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
@media(max-width: 600px) { .select-group { grid-template-columns: 1fr; } }
.select-wrap { position: relative; }
.select-wrap label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--slate); margin-bottom: 6px; }
.select-wrap select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 14px; color: var(--ink); background: white; appearance: none; cursor: pointer; outline: none; transition: border-color 0.2s; }
.select-wrap select:focus { border-color: var(--accent); }

/* INPUT AREA */
.input-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.input-btn { padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 7px; background: white; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--slate); cursor: pointer; transition: all 0.2s; }
.input-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

textarea {
  width: 100%; min-height: 160px; padding: 14px 16px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  resize: vertical; outline: none; transition: border-color 0.2s;
  line-height: 1.7;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--mist); }

.drop-zone {
  border: 2px dashed var(--border); border-radius: 10px;
  padding: 40px 24px; text-align: center; cursor: pointer;
  transition: all 0.2s; background: var(--bg);
}
.drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: var(--accent-light); }
.drop-icon { font-size: 32px; margin-bottom: 10px; }
.drop-text { font-size: 14px; color: var(--slate); margin-bottom: 4px; }
.drop-hint { font-size: 12px; color: var(--mist); }
.img-previews { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
.img-preview { position: relative; }
.img-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
.img-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: var(--red); color: white; border: none; border-radius: 50%; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* STUDENT SELECTOR */
.student-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 4px; }
@media(max-width: 600px) { .student-row { grid-template-columns: 1fr; } }

/* LANG TOGGLE */
.lang-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; width: fit-content; }
.lang-btn { padding: 5px 12px; border: none; background: transparent; font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--slate); cursor: pointer; border-radius: 5px; transition: all 0.15s; }
.lang-btn.active { background: white; color: var(--navy); box-shadow: 0 1px 3px rgba(14,30,53,0.08); }

/* CORRECT BUTTON */
.correct-btn {
  width: 100%; padding: 15px; background: var(--navy); color: white;
  border: none; border-radius: 10px; font-family: var(--sans);
  font-size: 16px; font-weight: 500; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
  letter-spacing: -0.2px;
}
.correct-btn:hover { background: var(--navy-mid); transform: translateY(-1px); }
.correct-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* LOADING */
.loading-wrap { text-align: center; padding: 48px 24px; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--serif); font-size: 18px; color: var(--navy); margin-bottom: 6px; }
.loading-sub { font-size: 13px; color: var(--mist); }

/* ERROR */
.error-box { background: var(--red-light); border: 1px solid #F09595; border-radius: 10px; padding: 14px 18px; font-size: 14px; color: var(--red); margin-bottom: 16px; }

/* RESULT */
.result-wrap { animation: fadeUp 0.4s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.score-header { display: flex; align-items: flex-start; gap: 24px; padding: 28px; background: var(--navy); border-radius: 14px 14px 0 0; }
.score-circle { width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.score-num { font-family: var(--serif); font-size: 36px; color: white; line-height: 1; }
.score-den { font-size: 12px; color: rgba(255,255,255,0.5); }
.score-info { flex: 1; }
.score-level { font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.score-summary { font-size: 15px; color: rgba(255,255,255,0.9); line-height: 1.6; font-weight: 300; }

.criteria-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.crit-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.crit-name { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--mist); margin-bottom: 8px; }
.crit-score { font-family: var(--serif); font-size: 28px; color: var(--navy); line-height: 1; margin-bottom: 6px; }
.crit-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.crit-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.6s ease; }
.crit-comment { font-size: 12px; color: var(--slate); line-height: 1.5; }

.errors-list { display: flex; flex-direction: column; gap: 10px; }
.error-item { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; }
.error-num { font-family: var(--serif); font-size: 18px; color: var(--mist); min-width: 28px; line-height: 1.2; }
.error-body { flex: 1; }
.error-type { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
.type-grammar { background: var(--red-light); color: var(--red); }
.type-vocabulary { background: var(--amber-light); color: var(--amber); }
.type-spelling { background: var(--accent-light); color: var(--accent); }
.type-punctuation { background: #F3F0FF; color: #5B21B6; }
.type-style { background: var(--green-light); color: var(--green); }
.error-change { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 14px; }
.err-wrong { background: var(--red-light); color: var(--red); padding: 1px 8px; border-radius: 4px; text-decoration: line-through; font-family: 'Courier New', monospace; }
.err-right { background: var(--green-light); color: var(--green); padding: 1px 8px; border-radius: 4px; font-family: 'Courier New', monospace; }
.err-arrow { color: var(--mist); }
.error-expl { font-size: 13px; color: var(--slate); line-height: 1.5; }

.feedback-box { background: var(--accent-light); border: 1px solid #C2DCF0; border-radius: 10px; padding: 18px 20px; }
.feedback-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.feedback-text { font-size: 14px; color: var(--ink); line-height: 1.7; font-weight: 300; }

.points-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:600px) { .points-grid { grid-template-columns: 1fr; } }
.points-card { border-radius: 10px; padding: 16px; }
.points-card.strengths { background: var(--green-light); border: 1px solid #A8DCC3; }
.points-card.improvements { background: var(--amber-light); border: 1px solid #FAC775; }
.points-title { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
.strengths .points-title { color: var(--green); }
.improvements .points-title { color: var(--amber); }
.points-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.points-list li { font-size: 13px; line-height: 1.5; display: flex; gap: 8px; }
.points-list li::before { flex-shrink: 0; }
.strengths .points-list li::before { content: '✓'; color: var(--green); font-weight: 700; }
.improvements .points-list li::before { content: '→'; color: var(--amber); font-weight: 700; }

/* ACTION BUTTONS */
.action-row { display: flex; gap: 10px; flex-wrap: wrap; padding: 20px 28px; border-top: 1px solid var(--border); background: var(--bg); border-radius: 0 0 14px 14px; }
.action-btn { padding: 9px 18px; border: 1.5px solid var(--border); border-radius: 8px; background: white; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--navy); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.primary { background: var(--navy); color: white; border-color: var(--navy); }
.action-btn.primary:hover { background: var(--navy-mid); border-color: var(--navy-mid); color: white; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
@media(max-width:600px) { .stats-grid { grid-template-columns: 1fr; } }
.stat-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.stat-num { font-family: var(--serif); font-size: 32px; color: var(--navy); line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 13px; color: var(--slate); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(14,30,53,0.4); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px; }
.modal { background: white; border-radius: 16px; max-width: 480px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(14,30,53,0.2); }
.modal-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: var(--serif); font-size: 22px; color: var(--navy); }
.modal-close { background: none; border: none; font-size: 20px; color: var(--mist); cursor: pointer; line-height: 1; }
.modal-body { padding: 20px 28px 28px; }

/* UPGRADE */
.plan-grid { display: flex; flex-direction: column; gap: 12px; }
.plan-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 18px 20px; cursor: pointer; transition: all 0.2s; }
.plan-card:hover { border-color: var(--accent); }
.plan-card.featured { border-color: var(--accent); background: var(--accent-light); }
.plan-name { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.plan-price { font-family: var(--serif); font-size: 24px; color: var(--navy); }
.plan-price span { font-family: var(--sans); font-size: 13px; color: var(--mist); }
.plan-desc { font-size: 12px; color: var(--slate); margin-top: 6px; }

/* HISTORY */
.history-item { padding: 14px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.history-item:last-child { border-bottom: none; }
.history-name { font-size: 14px; font-weight: 500; color: var(--navy); }
.history-meta { font-size: 12px; color: var(--mist); margin-top: 2px; }

/* LIMIT BAR */

.limit-bar-label { font-size: 13px; color: var(--slate); }

/* UTILS */

.small-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: white; font-family: var(--sans); font-size: 12px; color: var(--slate); cursor: pointer; transition: all 0.15s; }
.small-btn:hover { border-color: var(--slate); color: var(--navy); }
.small-btn.danger { color: var(--red); border-color: #F09595; }
.small-btn.danger:hover { background: var(--red-light); }

@media(max-width:640px) {
  .score-header { flex-direction: column; }
  .criteria-grid { grid-template-columns: 1fr 1fr; }
}

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Storage (localStorage) ──────────────────────────────────────
const storage = {
  get: (k) => { try { return JSON.parse(localStorage.getItem('wc2_' + k)); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem('wc2_' + k, JSON.stringify(v)); } catch {} },
  remove: (k) => localStorage.removeItem('wc2_' + k),
  keys: (prefix) => {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('wc2_' + prefix)) out.push(k.replace('wc2_', ''));
    }
    return out;
  }
};

const uid = () => Math.random().toString(36).slice(2, 10);

const PLANS = {
  free: { name: 'Gratuito', limit: 5 },
  basic: { name: 'Básico', limit: 80 },
  teacher: { name: 'Profesor', limit: 250 },
  center: { name: 'Centro', limit: Infinity }
};

const LEVELS = ['A1','A2','B1','B2','C1','C2'];
const COURSES = ['1º ESO','2º ESO','3º ESO','4º ESO','1º Bach','2º Bach'];
const WRITING_TYPES = ['Email / Carta','Redacción / Essay','Descripción','Opinión','Narrativa','Informe','Otro'];

// ── API ──────────────────────────────────────────────────────────
async function callAPI(payload) {
  const res = await fetch('/api/correct', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── AUTH ─────────────────────────────────────────────────────────
function Auth({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [center, setCenter] = useState('');
  const [err, setErr] = useState('');

  function submit() {
    setErr('');
    if (!email.includes('@')) return setErr('Email inválido.');
    if (pass.length < 6) return setErr('Contraseña mínimo 6 caracteres.');
    if (tab === 'register' && !name.trim()) return setErr('Introduce tu nombre.');

    if (tab === 'register') {
      const existing = storage.get('user:' + email);
      if (existing) return setErr('Ya existe una cuenta con ese email.');
      const user = { email, name, center, plan: 'free', correctionsUsed: 0, createdAt: Date.now() };
      storage.set('user:' + email, user);
      storage.set('pass:' + email, pass);
      storage.set('session', email);
      onLogin(user);
    } else {
      const user = storage.get('user:' + email);
      const storedPass = storage.get('pass:' + email);
      if (!user || storedPass !== pass) return setErr('Email o contraseña incorrectos.');
      storage.set('session', email);
      onLogin(user);
    }
  }

  return (
    <div className="app-wrap">
      <div className="auth-wrap">
        <div className="auth-brand-panel">
          <div className="auth-brand-top">
            <div className="auth-brand-logo">
              <div className="auth-brand-mark">✏️</div>
              <div className="auth-brand-name">Writing<span>Correct</span></div>
            </div>
            <div className="auth-tagline">Corrige writings con <em>precisión,</em> en segundos</div>
            <div className="auth-tagline-sub">La herramienta que los profesores de inglés estaban esperando. IA calibrada al nivel del alumno, feedback listo para entregar.</div>
          </div>
          <div className="auth-features">
            <div className="auth-feature">
              <div className="auth-feature-icon">✦</div>
              <div className="auth-feature-text"><strong>Nota sobre 10 y criterios MCER</strong><span>Adaptada al nivel del alumno, de A1 a C2 o por curso de ESO y Bachillerato</span></div>
            </div>
            <div className="auth-feature">
              <div className="auth-feature-icon">✦</div>
              <div className="auth-feature-text"><strong>Errores numerados y explicados</strong><span>Gramática, vocabulario, ortografía y puntuación con explicación pedagógica</span></div>
            </div>
            <div className="auth-feature">
              <div className="auth-feature-icon">✦</div>
              <div className="auth-feature-text"><strong>Exportación a iDoceo y Classroom</strong><span>PDF para el alumno y CSV para importar directamente en tu plataforma</span></div>
            </div>
          </div>
        </div>
        <div className="auth-form-panel">
        <div className="auth-box">
          <div className="auth-logo-wrap">
            <div className="auth-logo-mark">✏️</div>
            <div className="auth-brand">Writing<span>Correct</span></div>
          </div>
          <div className="auth-tabs">
            <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>Entrar</button>
            <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>Crear cuenta</button>
          </div>
          <h2 className="auth-title">{tab==='login' ? 'Bienvenida de nuevo' : 'Crea tu cuenta'}</h2>
          <p className="auth-sub">{tab==='login' ? 'Accede a tu corrector de writings.' : '5 correcciones gratuitas para empezar.'}</p>
          {err && <div className="auth-err">{err}</div>}
          {tab==='register' && (
            <div className="field">
              <label>Nombre</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre" />
            </div>
          )}
          <div className="field">
            <label>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" />
          </div>
          <div className="field">
            <label>Contraseña</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••" onKeyDown={e=>e.key==='Enter'&&submit()} />
          </div>
          {tab==='register' && (
            <div className="field">
              <label>Centro educativo <span style={{fontWeight:300,textTransform:'none',letterSpacing:0}}>(opcional)</span></label>
              <input value={center} onChange={e=>setCenter(e.target.value)} placeholder="IES Nombre del centro" />
            </div>
          )}
          <button className="btn-full" onClick={submit}>{tab==='login' ? 'Entrar' : 'Crear cuenta gratis'}</button>
          <div className="auth-switch">
            {tab==='login' ? <>¿No tienes cuenta? <a onClick={()=>setTab('register')}>Regístrate gratis</a></> : <>¿Ya tienes cuenta? <a onClick={()=>setTab('login')}>Entra aquí</a></>}
          </div>
        </div>
        </div>
      </div>
    </div>
  );
}

// ── UPGRADE MODAL ────────────────────────────────────────────────
function UpgradeModal({ onClose, onUpgrade, user, reason }) {
  const [loading, setLoading] = React.useState(null);

  async function handleUpgrade(plan) {
    setLoading(plan);
    try {
      const res = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ plan, email: user?.email || '' })
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert('Error al conectar con Stripe: ' + (data.error || 'Inténtalo de nuevo.'));
      }
    } catch (e) {
      alert('Error: ' + e.message);
    } finally {
      setLoading(null);
    }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Mejora tu plan</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {reason && <div className="error-box" style={{marginBottom:16}}>{reason}</div>}
          <div className="plan-grid">
            <div className="plan-card" onClick={()=>handleUpgrade('basic')} style={{opacity: loading&&loading!=='basic'?0.5:1}}>
              <div className="plan-name">Básico</div>
              <div className="plan-price">6,99€ <span>/mes</span></div>
              <div className="plan-desc">80 correcciones · Clases y alumnos · PDF básico</div>
              {loading==='basic' && <div style={{fontSize:12,color:'var(--accent)',marginTop:8}}>Redirigiendo a Stripe…</div>}
            </div>
            <div className="plan-card featured" onClick={()=>handleUpgrade('teacher')} style={{opacity: loading&&loading!=='teacher'?0.5:1}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--accent)',marginBottom:6,letterSpacing:'0.5px'}}>MÁS POPULAR</div>
              <div className="plan-name">Profesor</div>
              <div className="plan-price">9,99€ <span>/mes</span></div>
              <div className="plan-desc">250 correcciones · PDF completo · iDoceo y Classroom · Rúbricas guardadas</div>
              {loading==='teacher' && <div style={{fontSize:12,color:'var(--accent)',marginTop:8}}>Redirigiendo a Stripe…</div>}
            </div>
            <div className="plan-card" onClick={()=>handleUpgrade('center')} style={{opacity: loading&&loading!=='center'?0.5:1}}>
              <div className="plan-name">Centro</div>
              <div className="plan-price">39€ <span>/mes</span></div>
              <div className="plan-desc">Ilimitado · 5 profesores · Soporte prioritario</div>
              {loading==='center' && <div style={{fontSize:12,color:'var(--accent)',marginTop:8}}>Redirigiendo a Stripe…</div>}
            </div>
          </div>
          <p style={{fontSize:12,color:'var(--mist)',marginTop:16,textAlign:'center'}}>Pago seguro con Stripe · Cancela cuando quieras</p>
        </div>
      </div>
    </div>
  );
}

// ── SCORE COLOR ───────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 7) return 'var(--green)';
  if (s >= 5) return 'var(--amber)';
  return 'var(--red)';
}

function errorTypeClass(t) {
  const map = { grammar:'type-grammar', gramática:'type-grammar', vocabulary:'type-vocabulary', vocabulario:'type-vocabulary', spelling:'type-spelling', ortografía:'type-spelling', punctuation:'type-punctuation', puntuación:'type-punctuation', style:'type-style', estilo:'type-style' };
  return map[t?.toLowerCase()] || 'type-grammar';
}

function errorTypeLabel(t) {
  const map = { grammar:'Gramática', vocabulary:'Vocabulario', spelling:'Ortografía', punctuation:'Puntuación', style:'Estilo', gramática:'Gramática', vocabulario:'Vocabulario', ortografía:'Ortografía', puntuación:'Puntuación', estilo:'Estilo' };
  return map[t?.toLowerCase()] || t || 'Error';
}

// ── RESULT ───────────────────────────────────────────────────────
function Result({ result, transcribedText, user, feedbackLang, onReset, studentName, writingType, modeLabel }) {
  const score = result.nota ?? result.overallScore ?? result.finalScore ?? 0;
  const criteria = result.criterios
    ? Object.entries(result.criterios).map(([k,v])=>({name:k,score:v,comment:''}))
    : (result.categories || []);
  const errors = result.errores || result.errors || [];
  const feedback = result.feedback_alumno || result.studentFeedback || '';
  const summary = result.comentario_profesor || result.summary || '';
  const strengths = result.strengths || [];
  const improvements = result.improvements || [];

  function exportCSV() {
    const rows = [
      ['Nombre','Tipo','Nivel','Nota','Fecha'].join(','),
      [studentName||'—', writingType||'—', modeLabel||'—', score.toFixed(1), new Date().toLocaleDateString('es-ES')].join(',')
    ];
    const blob = new Blob(['\ufeff'+rows.join('\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='writingcorrect_'+Date.now()+'.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function printPDF() {
    const scoreColor = score >= 7 ? '#1A7F5A' : score >= 5 ? '#92520C' : '#A32D2D';
    const criteriaHtml = criteria.map(c=>`
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:13px;color:#4A5C70;text-transform:capitalize">${c.name}</span>
          <span style="font-weight:600;color:#0E1E35">${Number(c.score||0).toFixed(1)}</span>
        </div>
        <div style="background:#D8E2EC;height:5px;border-radius:3px;overflow:hidden">
          <div style="width:${(c.score||0)*10}%;height:100%;background:#1D6FA4"></div>
        </div>
        ${c.comment?`<div style="font-size:11px;color:#8A9BAD;margin-top:3px">${c.comment}</div>`:''}
      </div>`).join('');
    const errorsHtml = errors.slice(0,20).map((e,i)=>`
      <div style="border:1px solid #D8E2EC;border-radius:8px;padding:12px 14px;margin-bottom:8px;page-break-inside:avoid">
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span style="font-size:16px;color:#8A9BAD;font-weight:600;min-width:24px">${i+1}.</span>
          <div style="flex:1">
            <span style="background:#FCEBEB;color:#A32D2D;padding:1px 6px;border-radius:3px;text-decoration:line-through;font-family:Courier New">${e.original||''}</span>
            <span style="margin:0 6px;color:#8A9BAD">→</span>
            <span style="background:#E6F6EF;color:#1A7F5A;padding:1px 6px;border-radius:3px;font-family:Courier New">${e.correcto||e.correction||''}</span>
            <div style="font-size:12px;color:#4A5C70;margin-top:6px;line-height:1.5">${e.explicacion||e.explanation||''}</div>
          </div>
        </div>
      </div>`).join('');
    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Corrección - ${studentName||'Alumno'}</title>
      <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
      <style>@page{size:A4;margin:1.5cm}body{font-family:'DM Sans',sans-serif;color:#1A2638;line-height:1.6;margin:0;background:white}.container{max-width:800px;margin:0 auto;padding:20px}</style>
      </head><body><div class="container">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;background:#0E1E35;border-radius:12px;padding:24px 28px;margin-bottom:24px">
        <div>
          <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px">WritingCorrect · Informe de corrección</div>
          <div style="font-family:'DM Serif Display',serif;font-size:22px;color:white;margin-bottom:4px">${studentName||'Alumno/a'}</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.6)">${writingType||''} · ${modeLabel||''} · ${new Date().toLocaleDateString('es-ES')}</div>
        </div>
        <div style="width:80px;height:80px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
          <div style="font-family:'DM Serif Display',serif;font-size:32px;color:white;line-height:1">${Number(score).toFixed(1)}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.5)">/10</div>
        </div>
      </div>
      ${summary?`<div style="background:#E8F3FB;border-left:3px solid #1D6FA4;padding:14px 18px;border-radius:0 8px 8px 0;margin-bottom:20px;font-size:14px;color:#1A2638;line-height:1.6">${summary}</div>`:''}
      ${criteria.length?`<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8A9BAD;margin-bottom:14px">Criterios de evaluación</div>${criteriaHtml}</div>`:''}
      ${errors.length?`<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8A9BAD;margin-bottom:14px">Errores (${errors.length})</div>${errorsHtml}</div>`:''}
      ${feedback?`<div style="background:#E8F3FB;border:1px solid #C2DCF0;border-radius:10px;padding:18px 20px;margin-bottom:20px"><div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#1D6FA4;margin-bottom:10px">Feedback para el alumno</div><div style="font-size:14px;color:#1A2638;line-height:1.7;font-weight:300">${feedback}</div></div>`:''}
      <div style="margin-top:40px;padding-top:14px;border-top:1px solid #D8E2EC;text-align:center;color:#8A9BAD;font-size:11px">WritingCorrect · writingcorrect.com · ${new Date().toLocaleDateString('es-ES')}</div>
      </div><script>window.onload=()=>setTimeout(()=>window.print(),400);</scr`+`ipt></body></html>`;
    const w = window.open('','_blank');
    if (w) { w.document.write(html); w.document.close(); }
  }

  return (
    <div className="result-wrap">
      <div className="card">
        <div className="score-header">
          <div className="score-circle">
            <div className="score-num">{Number(score).toFixed(1)}</div>
            <div className="score-den">/10</div>
          </div>
          <div className="score-info">
            <div className="score-level">{result.nivel_detectado || modeLabel || 'Resultado'}</div>
            {summary && <div className="score-summary">{summary}</div>}
          </div>
        </div>

        {criteria.length > 0 && (
          <div className="card-section">
            <div className="card-label">Criterios de evaluación</div>
            <div className="criteria-grid">
              {criteria.map((c,i) => (
                <div key={i} className="crit-card">
                  <div className="crit-name">{c.name}</div>
                  <div className="crit-score" style={{color:scoreColor(c.score)}}>{Number(c.score||0).toFixed(1)}</div>
                  <div className="crit-bar"><div className="crit-fill" style={{width:`${(c.score||0)*10}%`,background:scoreColor(c.score)}}></div></div>
                  {c.comment && <div className="crit-comment">{c.comment}</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {errors.length > 0 && (
          <div className="card-section">
            <div className="card-label">{errors.length} error{errors.length!==1?'es':''} encontrado{errors.length!==1?'s':''}</div>
            <div className="errors-list">
              {errors.map((e,i) => (
                <div key={i} className="error-item">
                  <div className="error-num">{i+1}</div>
                  <div className="error-body">
                    <div><span className={`error-type ${errorTypeClass(e.tipo||e.type)}`}>{errorTypeLabel(e.tipo||e.type)}</span></div>
                    <div className="error-change">
                      <span className="err-wrong">{e.original}</span>
                      <span className="err-arrow">→</span>
                      <span className="err-right">{e.correcto||e.correction}</span>
                    </div>
                    <div className="error-expl">{e.explicacion||e.explanation}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {(strengths.length > 0 || improvements.length > 0) && (
          <div className="card-section">
            <div className="points-grid">
              {strengths.length > 0 && (
                <div className="points-card strengths">
                  <div className="points-title">Puntos fuertes</div>
                  <ul className="points-list">{strengths.map((s,i)=><li key={i}>{s}</li>)}</ul>
                </div>
              )}
              {improvements.length > 0 && (
                <div className="points-card improvements">
                  <div className="points-title">A mejorar</div>
                  <ul className="points-list">{improvements.map((s,i)=><li key={i}>{s}</li>)}</ul>
                </div>
              )}
            </div>
          </div>
        )}

        {feedback && (
          <div className="card-section">
            <div className="feedback-box">
              <div className="feedback-label">Feedback para el alumno</div>
              <div className="feedback-text">{feedback}</div>
            </div>
          </div>
        )}

        <div className="action-row">
          <button className="action-btn primary" onClick={printPDF}>Descargar PDF</button>
          <button className="action-btn" onClick={exportCSV}>Exportar CSV (iDoceo)</button>
          <button className="action-btn" onClick={onReset}>Nueva corrección</button>
        </div>
      </div>
    </div>
  );
}

// ── CORRECTOR ────────────────────────────────────────────────────
function Corrector({ user, onUserChange, onLogout }) {
  const [mode, setMode] = useState('level');
  const [level, setLevel] = useState('B1');
  const [course, setCourse] = useState('3º ESO');
  const [writingType, setWritingType] = useState('Redacción / Essay');
  const [inputMode, setInputMode] = useState('text');
  const [text, setText] = useState('');
  const [images, setImages] = useState([]);
  const [feedbackLang, setFeedbackLang] = useState('es');
  const [studentName, setStudentName] = useState('');
  const [loading, setLoading] = useState(false);
  const [loadingStep, setLoadingStep] = useState('');
  const [result, setResult] = useState(null);
  const [transcribedText, setTranscribedText] = useState('');
  const [error, setError] = useState('');
  const [dragOver, setDragOver] = useState(false);
  const [showUpgrade, setShowUpgrade] = useState(false);
  const [upgradeReason, setUpgradeReason] = useState('');
  const [showMenu, setShowMenu] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [history, setHistory] = useState([]);
  const resultRef = useRef(null);
  const fileRef = useRef(null);

  const isPaid = user.plan !== 'free';
  const used = user.correctionsUsed || 0;
  const limit = PLANS[user.plan]?.limit || 5;
  const remaining = limit === Infinity ? Infinity : Math.max(0, limit - used);

  useEffect(() => {
    const items = storage.keys('correction:' + user.email + ':')
      .map(k => storage.get(k))
      .filter(Boolean)
      .sort((a,b) => b.createdAt - a.createdAt);
    setHistory(items);
  }, [result]);

  const modeLabel = mode === 'level' ? 'Nivel ' + level : course;

  async function handleImageFiles(files) {
    const newImgs = [];
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      const base64 = await fileToBase64(f);
      newImgs.push({ preview: URL.createObjectURL(f), base64, mediaType: f.type });
    }
    setImages(prev => [...prev, ...newImgs]);
  }

  async function correct() {
    setError('');
    if (remaining <= 0) {
      setUpgradeReason(`Has usado tus ${limit} correcciones${user.plan==='free'?' gratuitas':' de este mes'}. Mejora tu plan para continuar.`);
      setShowUpgrade(true);
      return;
    }
    if (inputMode === 'text' && text.trim().length < 20) return setError('El texto debe tener al menos 20 caracteres.');
    if (inputMode === 'photo' && images.length === 0) return setError('Sube al menos una foto del writing.');

    setLoading(true);
    setResult(null);

    try {
      let writingText = text;

      if (inputMode === 'photo') {
        setLoadingStep('Leyendo el writing de la imagen…');
        // Transcribe via our API
        const transcribePayload = {
          texto: '__transcribe__',
          images: images.map(i => ({ base64: i.base64, mediaType: i.mediaType }))
        };
        const transcribeRes = await fetch('/api/correct', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(transcribePayload)
        });
        const transcribeData = await transcribeRes.json();
        writingText = transcribeData.transcription || transcribeData.texto || '';
        if (!writingText || writingText.length < 10) {
          setError('No se pudo leer la imagen. Prueba con una foto más nítida.');
          setLoading(false);
          setLoadingStep('');
          return;
        }
        setTranscribedText(writingText);
      } else {
        setTranscribedText(writingText);
      }

      setLoadingStep('Analizando y corrigiendo el writing…');

      const payload = {
        texto: writingText,
        nivel: mode === 'level' ? level : null,
        curso: mode === 'course' ? course : null,
        idioma_feedback: feedbackLang
      };

      const data = await callAPI(payload);
      setResult(data);

      // Save to history
      const id = uid();
      const record = {
        id, createdAt: Date.now(),
        studentName: studentName || 'Alumno/a',
        writingType, modeLabel,
        result: data, transcribedText: writingText, feedbackLang
      };
      storage.set('correction:' + user.email + ':' + id, record);

      // Update usage
      const updated = { ...user, correctionsUsed: used + 1 };
      storage.set('user:' + user.email, updated);
      onUserChange(updated);

      setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
    } catch (e) {
      setError('Error al corregir: ' + (e.message || 'Inténtalo de nuevo.'));
    } finally {
      setLoading(false);
      setLoadingStep('');
    }
  }

  function upgrade(plan) {
    const updated = { ...user, plan, correctionsUsed: 0 };
    storage.set('user:' + user.email, updated);
    onUserChange(updated);
    setShowUpgrade(false);
    alert('¡Plan ' + PLANS[plan].name + ' activado! Los pagos se integrarán próximamente con Stripe.');
  }

  function logout() {
    if (confirm('¿Cerrar sesión?')) { storage.remove('session'); onLogout(); }
  }

  const usedPct = limit === Infinity ? 0 : Math.min(100, (used / limit) * 100);
  const limitColor = remaining > limit * 0.3 ? 'var(--accent)' : remaining > 0 ? 'var(--amber)' : 'var(--red)';

  return (
    <div className="app-wrap">
      {/* NAV */}
      <nav>
        <a href="/" className="logo">
          <div className="logo-mark">✏️</div>
          <span className="logo-text">Writing<span>Correct</span></span>
        </a>
        <div className="nav-right">
          {limit !== Infinity && (
            <div className="nav-pill">
              <span className="usage-dot" style={{background: limitColor}}></span>
              {remaining} / {limit} correcciones
            </div>
          )}
          <div className="lang-toggle">
            <button className={`lang-btn ${feedbackLang==='es'?'active':''}`} onClick={()=>setFeedbackLang('es')}>🇪🇸 ES</button>
            <button className={`lang-btn ${feedbackLang==='en'?'active':''}`} onClick={()=>setFeedbackLang('en')}>🇬🇧 EN</button>
          </div>
          <button className="nav-btn" onClick={()=>setShowHistory(true)}>Historial</button>
          {user.plan !== 'center' && (
            <button className="nav-btn-primary" onClick={()=>{setUpgradeReason('');setShowUpgrade(true);}}>
              {user.plan==='free' ? 'Hazte Pro' : 'Mejorar plan'}
            </button>
          )}
          <div style={{position:'relative'}}>
            <button className="avatar" onClick={()=>setShowMenu(!showMenu)}>
              {(user.name[0]||'?').toUpperCase()}
            </button>
            {showMenu && (
              <div className="dropdown" onMouseLeave={()=>setShowMenu(false)}>
                <div className="dropdown-header">
                  <div className="dropdown-name">{user.name}</div>
                  <div className="dropdown-email">{user.email}</div>
                  <div className="dropdown-plan">{PLANS[user.plan]?.name}</div>
                </div>
                <button className="dropdown-item" onClick={logout}>Cerrar sesión</button>
              </div>
            )}
          </div>
        </div>
      </nav>

      <div className="app-main">
        {/* HEADER */}
        <div className="section-top">
          <div className="tag">Bienvenida, {user.name.split(' ')[0]}</div>
          <h1 className="page-title">Corrige writings con <em style={{fontStyle:'italic',color:'var(--accent)'}}>precisión</em></h1>
          <p className="page-sub">Sube una foto del examen o pega el texto. Nota sobre 10, errores explicados y feedback listo para el alumno.</p>
        </div>

        {/* LIMIT BAR */}
        {limit !== Infinity && (
          <div className="limit-bar-wrap">
            <div className="limit-bar-top">
              <span className="limit-bar-label">Correcciones usadas este mes</span>
              <span className="limit-bar-count">{used} de {limit}</span>
            </div>
            <div className="limit-bar">
              <div className="limit-bar-fill" style={{width: usedPct + '%', background: limitColor}}></div>
            </div>
          </div>
        )}

        {/* CORRECTOR CARD */}
        {!result && !loading && (
          <div className="card">
            {/* MODE */}
            <div className="card-section">
              <div className="card-label">Modo de corrección</div>
              <div className="mode-tabs">
                <button className={`mode-tab ${mode==='level'?'active':''}`} onClick={()=>setMode('level')}>Por nivel MCER</button>
                <button className={`mode-tab ${mode==='course'?'active':''}`} onClick={()=>setMode('course')}>Por curso</button>
              </div>
              <div className="select-group">
                {mode === 'level' ? (
                  <div className="select-wrap">
                    <label>Nivel MCER</label>
                    <select value={level} onChange={e=>setLevel(e.target.value)}>
                      {LEVELS.map(l => <option key={l}>{l}</option>)}
                    </select>
                  </div>
                ) : (
                  <div className="select-wrap">
                    <label>Curso</label>
                    <select value={course} onChange={e=>setCourse(e.target.value)}>
                      {COURSES.map(c => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                )}
                <div className="select-wrap">
                  <label>Tipo de writing</label>
                  <select value={writingType} onChange={e=>setWritingType(e.target.value)}>
                    {WRITING_TYPES.map(t => <option key={t}>{t}</option>)}
                  </select>
                </div>
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.8px',textTransform:'uppercase',color:'var(--slate)',marginBottom:6,display:'block'}}>Nombre del alumno/a <span style={{fontWeight:300,textTransform:'none',letterSpacing:0}}>(opcional)</span></label>
                <input
                  style={{padding:'10px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontFamily:'var(--sans)',fontSize:14,color:'var(--ink)',outline:'none',width:'100%',maxWidth:320,transition:'border-color 0.2s'}}
                  value={studentName}
                  onChange={e=>setStudentName(e.target.value)}
                  placeholder="Nombre del alumno"
                  onFocus={e=>e.target.style.borderColor='var(--accent)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'}
                />
              </div>
            </div>

            {/* INPUT */}
            <div className="card-section">
              <div className="card-label">Writing del alumno</div>
              <div className="input-toggle">
                <button className={`input-btn ${inputMode==='text'?'active':''}`} onClick={()=>setInputMode('text')}>✏️ Texto</button>
                <button className={`input-btn ${inputMode==='photo'?'active':''}`} onClick={()=>setInputMode('photo')}>📷 Foto</button>
              </div>
              {inputMode === 'text' ? (
                <textarea
                  value={text}
                  onChange={e=>setText(e.target.value)}
                  placeholder="Pega aquí el texto del writing del alumno, respetando los errores originales…"
                />
              ) : (
                <div>
                  <div
                    className={`drop-zone ${dragOver?'over':''}`}
                    onClick={()=>fileRef.current?.click()}
                    onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                    onDragLeave={()=>setDragOver(false)}
                    onDrop={e=>{e.preventDefault();setDragOver(false);handleImageFiles(Array.from(e.dataTransfer.files));}}
                  >
                    <div className="drop-icon">📄</div>
                    <div className="drop-text">Arrastra la foto aquí o haz clic para subir</div>
                    <div className="drop-hint">JPG, PNG — Puedes subir varias páginas</div>
                  </div>
                  <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>handleImageFiles(Array.from(e.target.files))} />
                  {images.length > 0 && (
                    <div className="img-previews">
                      {images.map((img,i) => (
                        <div key={i} className="img-preview">
                          <img src={img.preview} alt="" />
                          <button className="img-remove" onClick={()=>setImages(prev=>{URL.revokeObjectURL(prev[i].preview);return prev.filter((_,j)=>j!==i)})}>×</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* SUBMIT */}
            <div className="card-section">
              {error && <div className="error-box">{error}</div>}
              <button className="correct-btn" onClick={correct} disabled={remaining <= 0}>
                {remaining <= 0 ? 'Sin correcciones disponibles' : '✦ Corregir writing'}
              </button>
              {remaining <= 0 && (
                <div style={{textAlign:'center',marginTop:10}}>
                  <a style={{fontSize:13,color:'var(--accent)',cursor:'pointer'}} onClick={()=>setShowUpgrade(true)}>Ampliar plan →</a>
                </div>
              )}
            </div>
          </div>
        )}

        {/* LOADING */}
        {loading && (
          <div className="card">
            <div className="loading-wrap">
              <div className="loading-spinner"></div>
              <div className="loading-text">Corrigiendo el writing…</div>
              <div className="loading-sub">{loadingStep || 'Esto tarda unos segundos.'}</div>
            </div>
          </div>
        )}

        {/* RESULT */}
        {result && (
          <div ref={resultRef}>
            <Result
              result={result}
              transcribedText={transcribedText}
              user={user}
              feedbackLang={feedbackLang}
              studentName={studentName || 'Alumno/a'}
              writingType={writingType}
              modeLabel={modeLabel}
              onReset={()=>{setResult(null);setText('');setImages([]);setStudentName('');setTranscribedText('');window.scrollTo({top:0,behavior:'smooth'});}}
            />
          </div>
        )}
      </div>

      {/* HISTORY MODAL */}
      {showHistory && (
        <div className="modal-overlay" onClick={()=>setShowHistory(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:540}}>
            <div className="modal-header">
              <div className="modal-title">Historial</div>
              <button className="modal-close" onClick={()=>setShowHistory(false)}>×</button>
            </div>
            <div className="modal-body">
              {history.length === 0 ? (
                <p style={{color:'var(--mist)',fontSize:14,textAlign:'center',padding:'20px 0'}}>Todavía no hay correcciones guardadas.</p>
              ) : history.map(h => (
                <div key={h.id} className="history-item">
                  <div>
                    <div className="history-name">{h.studentName}</div>
                    <div className="history-meta">{h.writingType} · {h.modeLabel} · {new Date(h.createdAt).toLocaleDateString('es-ES')}</div>
                  </div>
                  <div className="history-score">{Number(h.result?.nota ?? h.result?.overallScore ?? 0).toFixed(1)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* UPGRADE MODAL */}
      {showUpgrade && <UpgradeModal onClose={()=>setShowUpgrade(false)} onUpgrade={upgrade} user={user} reason={upgradeReason} />}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [booting, setBooting] = useState(true);

  useEffect(() => {
    const session = storage.get('session');
    if (session) {
      const u = storage.get('user:' + session);
      if (u) setUser(u);
    }
    setBooting(false);
  }, []);

  if (booting) return null;
  if (!user) return <Auth onLogin={setUser} />;
  return <Corrector user={user} onUserChange={setUser} onLogout={()=>setUser(null)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
