<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WritingCorrect — Corrector de Writings con IA</title>
<meta name="description" content="Corrige writings de inglés en segundos con IA. Nota automática, errores explicados, feedback pedagógico.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://writingcorrect.com/app">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0E1E35;--navy-mid:#1B3252;--ink:#1A2638;--slate:#4A5C70;--mist:#8A9BAD;
  --border:#D8E2EC;--bg:#D4DAE3;--white:#FFFFFF;--accent:#1D6FA4;--accent-light:#E8F3FB;
  --green:#1A7F5A;--green-light:#E6F6EF;--red:#A32D2D;--red-light:#FCEBEB;
  --amber:#92520C;--amber-light:#FDF3E3;
  --serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(235,238,242,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:34px;height:34px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-family:var(--sans);font-weight:600;font-size:17px;color:var(--navy);letter-spacing:-0.3px}
.logo-text span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-pill{background:white;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--slate);font-weight:500;display:flex;align-items:center;gap:6px}
.usage-dot{width:6px;height:6px;border-radius:50%}
.nav-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:6px 14px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--slate);cursor:pointer;transition:all 0.2s}
.nav-btn:hover{border-color:var(--slate);color:var(--navy)}
.nav-btn-primary{background:var(--navy);color:white;border:none;padding:7px 16px;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:background 0.2s}
.nav-btn-primary:hover{background:var(--navy-mid)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:white;border:none;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer}
.dropdown{position:absolute;top:46px;right:0;background:white;border:1px solid var(--border);border-radius:12px;min-width:220px;box-shadow:0 20px 50px rgba(14,30,53,0.12);z-index:200;overflow:hidden}
.dropdown-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.dropdown-name{font-size:14px;font-weight:600;color:var(--navy)}
.dropdown-email{font-size:12px;color:var(--mist);margin-top:2px}
.dropdown-plan{font-size:11px;background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:6px;font-weight:500}
.dropdown-item{width:100%;background:none;border:none;text-align:left;padding:10px 16px;font-family:var(--sans);font-size:13px;color:var(--slate);cursor:pointer;transition:background 0.15s}
.dropdown-item:hover{background:var(--bg);color:var(--navy)}

/* AUTH */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr}
@media(max-width:800px){.auth-wrap{grid-template-columns:1fr}.auth-brand-panel{display:none}}
.auth-brand-panel{background:var(--navy);padding:60px 52px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-brand-panel::before{content:'';position:absolute;top:-30%;right:-20%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(29,111,164,0.25) 0,transparent 70%)}
.auth-brand-top{position:relative;z-index:1}
.auth-brand-logo{display:flex;align-items:center;gap:12px;margin-bottom:60px}
.auth-brand-mark{width:42px;height:42px;background:rgba(255,255,255,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(255,255,255,0.15)}
.auth-brand-name{font-family:var(--sans);font-size:20px;font-weight:600;color:white;letter-spacing:-0.3px}
.auth-brand-name span{color:#7EC8F0}
.auth-tagline{font-family:var(--serif);font-size:clamp(32px,3vw,44px);color:white;line-height:1.1;margin-bottom:20px;letter-spacing:-0.5px}
.auth-tagline em{font-style:italic;color:#7EC8F0}
.auth-tagline-sub{font-size:15px;color:rgba(255,255,255,0.6);line-height:1.6;font-weight:300;max-width:340px}
.auth-features{position:relative;z-index:1;display:flex;flex-direction:column;gap:12px}
.auth-feature{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px}
.auth-feature-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.auth-feature-text strong{display:block;font-size:13px;font-weight:600;color:white;margin-bottom:2px}
.auth-feature-text span{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.4}
.auth-form-panel{background:var(--bg);display:flex;align-items:center;justify-content:center;padding:60px 52px}
@media(max-width:800px){.auth-form-panel{padding:80px 24px 40px}}
.auth-box{background:white;border:1px solid var(--border);border-radius:16px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(14,30,53,0.08)}
.auth-logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.auth-logo-mark{width:40px;height:40px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.auth-brand{font-family:var(--sans);font-size:20px;font-weight:600;color:var(--navy)}
.auth-brand span{color:var(--accent)}
.auth-tabs{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:28px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--slate);cursor:pointer;border-radius:6px;transition:all 0.2s}
.auth-tab.active{background:white;color:var(--navy);box-shadow:0 1px 4px rgba(14,30,53,0.08)}
.auth-title{font-family:var(--serif);font-size:26px;color:var(--navy);margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--slate);margin-bottom:24px;font-weight:300}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:15px;color:var(--ink);background:white;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--mist)}
.btn-full{width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:8px;font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:background 0.2s;margin-top:8px}
.btn-full:hover{background:var(--navy-mid)}
.btn-full:disabled{opacity:0.6;cursor:not-allowed}
.auth-switch{text-align:center;font-size:13px;color:var(--mist);margin-top:16px}
.auth-switch a{color:var(--accent);cursor:pointer;font-weight:500}
.auth-err{background:var(--red-light);border:1px solid #F09595;border-radius:7px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px}
.auth-ok{background:var(--green-light);border:1px solid #A8DCC3;border-radius:7px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:14px}

/* APP */
.app-wrap{padding-top:60px;min-height:100vh}
.app-main{max-width:880px;margin:0 auto;padding:40px 24px 80px}
.section-top{margin-bottom:32px}
.page-title{font-family:var(--serif);font-size:clamp(26px,3.5vw,36px);color:var(--navy);margin-bottom:6px}
.page-sub{font-size:15px;color:var(--slate);font-weight:300}

/* CARD */
.card{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.card-section{padding:24px 28px}
.card-section+.card-section{border-top:1px solid var(--border)}
.card-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mist);margin-bottom:14px}

/* MODE TABS */
.mode-tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);padding:3px;border-radius:10px;width:fit-content;margin-bottom:20px}
.mode-tab{padding:8px 16px;border:none;background:transparent;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--slate);border-radius:7px;cursor:pointer;transition:all 0.2s}
.mode-tab.active{background:white;color:var(--navy);box-shadow:0 1px 4px rgba(14,30,53,0.08);border:1px solid var(--border)}

/* SELECTS */
.select-group{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:600px){.select-group{grid-template-columns:1fr}}
.select-wrap label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.select-wrap select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:14px;color:var(--ink);background:white;appearance:none;cursor:pointer;outline:none;transition:border-color 0.2s}
.select-wrap select:focus{border-color:var(--accent)}

/* INPUT */
.input-toggle{display:flex;gap:8px;margin-bottom:16px}
.input-btn{padding:7px 16px;border:1.5px solid var(--border);border-radius:7px;background:white;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--slate);cursor:pointer;transition:all 0.2s}
.input-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
textarea{width:100%;min-height:160px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;color:var(--ink);resize:vertical;outline:none;transition:border-color 0.2s;line-height:1.7}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--mist)}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:40px 24px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg)}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:var(--accent-light)}
.drop-icon{font-size:32px;margin-bottom:10px}
.drop-text{font-size:14px;color:var(--slate);margin-bottom:4px}
.drop-hint{font-size:12px;color:var(--mist)}
.img-previews{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.img-preview{position:relative}
.img-preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.img-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--red);color:white;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* LANG TOGGLE */
.lang-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;width:fit-content}
.lang-btn{padding:5px 12px;border:none;background:transparent;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--slate);cursor:pointer;border-radius:5px;transition:all 0.15s}
.lang-btn.active{background:white;color:var(--navy);box-shadow:0 1px 3px rgba(14,30,53,0.08)}

/* CORRECT BUTTON */
.correct-btn{width:100%;padding:15px;background:var(--navy);color:white;border:none;border-radius:10px;font-family:var(--sans);font-size:16px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:-0.2px}
.correct-btn:hover{background:var(--navy-mid);transform:translateY(-1px)}
.correct-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

/* LOADING */
.loading-wrap{text-align:center;padding:48px 24px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--serif);font-size:18px;color:var(--navy);margin-bottom:6px}
.loading-sub{font-size:13px;color:var(--mist)}

/* ERROR BOX */
.error-box{background:var(--red-light);border:1px solid #F09595;border-radius:10px;padding:14px 18px;font-size:14px;color:var(--red);margin-bottom:16px}

/* ── RESULT — nuevo diseño ── */
.result-wrap{animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Cabecera nota */
.score-header{background:var(--navy);padding:28px 32px;display:flex;align-items:center;gap:20px;border-radius:14px 14px 0 0}
.score-circle{width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.score-num{font-family:var(--serif);font-size:34px;color:white;line-height:1}
.score-den{font-size:12px;color:rgba(255,255,255,0.5)}
.score-info{flex:1}
.score-level{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px}
.score-summary{font-size:14px;color:rgba(255,255,255,0.85);line-height:1.6;font-weight:300}

/* Dos columnas resultado */
.result-cols{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
@media(max-width:700px){.result-cols{grid-template-columns:1fr}}
.result-col{padding:24px 28px}
.result-col+.result-col{border-left:1px solid var(--border)}
@media(max-width:700px){.result-col+.result-col{border-left:none;border-top:1px solid var(--border)}}

/* Texto anotado */
.annotated-text{font-size:14px;line-height:2;color:var(--ink)}
.err-grammar{color:var(--red);border-bottom:2px solid #E24B4A;cursor:help}
.err-vocabulary{color:var(--amber);border-bottom:2px solid #EF9F27;cursor:help}
.err-spelling{color:var(--accent);border-bottom:2px solid #378ADD;cursor:help}
.err-punctuation{color:#5B21B6;border-bottom:2px solid #7F77DD;cursor:help}
.err-style{color:var(--green);border-bottom:2px solid #639922;cursor:help}

.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-g{background:var(--red-light);color:var(--red)}
.leg-v{background:var(--amber-light);color:var(--amber)}
.leg-s{background:var(--accent-light);color:var(--accent)}
.leg-p{background:#F3F0FF;color:#5B21B6}
.leg-st{background:var(--green-light);color:var(--green)}

/* Criterios */
.criteria{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.crit-row{display:flex;align-items:center;gap:10px}
.crit-name{font-size:12px;color:var(--slate);width:78px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.crit-val{font-size:12px;font-weight:600;color:var(--navy);width:28px;text-align:right;flex-shrink:0}

/* Lista de errores */
.errors-list{display:flex;flex-direction:column;gap:8px}
.err-item{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px}
.err-item-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.err-tag{font-size:9px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.err-tag-grammar{background:var(--red-light);color:var(--red)}
.err-tag-vocabulary{background:var(--amber-light);color:var(--amber)}
.err-tag-spelling{background:var(--accent-light);color:var(--accent)}
.err-tag-punctuation{background:#F3F0FF;color:#5B21B6}
.err-tag-style{background:var(--green-light);color:var(--green)}
.err-num{font-size:10px;color:var(--mist)}
.err-change{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.err-wrong{background:var(--red-light);color:var(--red);padding:1px 7px;border-radius:3px;text-decoration:line-through;font-family:'Courier New',monospace;font-size:12px}
.err-right{background:var(--green-light);color:var(--green);padding:1px 7px;border-radius:3px;font-family:'Courier New',monospace;font-size:12px}
.err-arrow{color:var(--mist);font-size:11px}
.err-expl{font-size:11px;color:var(--slate);line-height:1.5}

/* Feedback */
.feedback-box{background:var(--green-light);border:1px solid #A8DCC3;border-radius:10px;padding:14px 16px;margin-top:16px}
.feedback-label{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.feedback-text{font-size:13px;color:#1A4A3A;line-height:1.6;font-weight:300}

/* Puntos fuertes / a mejorar */
.points-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:500px){.points-grid{grid-template-columns:1fr}}
.points-card{border-radius:9px;padding:12px 14px}
.points-card.strengths{background:var(--green-light);border:1px solid #A8DCC3}
.points-card.improvements{background:var(--amber-light);border:1px solid #FAC775}
.points-title{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px}
.strengths .points-title{color:var(--green)}
.improvements .points-title{color:var(--amber)}
.points-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.points-list li{font-size:12px;line-height:1.4;display:flex;gap:6px}
.strengths .points-list li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}
.improvements .points-list li::before{content:'→';color:var(--amber);font-weight:700;flex-shrink:0}

/* Acciones */
.action-row{display:flex;gap:8px;flex-wrap:wrap;padding:16px 28px;border-top:1px solid var(--border);background:var(--bg);border-radius:0 0 14px 14px}
.action-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;background:white;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--navy);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.primary{background:var(--navy);color:white;border-color:var(--navy)}
.action-btn.primary:hover{background:var(--navy-mid)}

/* LIMIT BAR */
.limit-bar-wrap{background:white;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:20px}
.limit-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.limit-bar-label{font-size:13px;color:var(--slate)}
.limit-bar-count{font-size:13px;font-weight:500;color:var(--navy)}
.limit-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.limit-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(14,30,53,0.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:white;border-radius:16px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(14,30,53,0.2)}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--serif);font-size:22px;color:var(--navy)}
.modal-close{background:none;border:none;font-size:20px;color:var(--mist);cursor:pointer;line-height:1}
.modal-body{padding:20px 28px 28px}

/* PLANES */
.plan-grid{display:flex;flex-direction:column;gap:12px}
.plan-card{border:1.5px solid var(--border);border-radius:10px;padding:18px 20px;cursor:pointer;transition:all 0.2s}
.plan-card:hover{border-color:var(--accent)}
.plan-card.featured{border-color:var(--accent);background:var(--accent-light)}
.plan-name{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:4px}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Supabase ─────────────────────────────────── */
const SB_URL = window.__SUPABASE_URL__ || 'https://onrnbbjajlmdesoyqcrf.supabase.co';

/* ── Constantes ───────────────────────────────── */

/* ── Helpers ──────────────────────────────────── */
function fileToBase64(file) {
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
}

async function getProfile(userId) {
  if (!sb) return null;

async function createProfile(userId, {name, center}) {

}

/* Construye el texto anotado con spans coloreados para cada error */
function buildAnnotatedText(text, errors) {
  if (!errors || errors.length === 0) return [{type:'text', content:text}];
  // Ordenar errores por posición de aparición en el texto
  const sorted = [...errors].sort((a,b) => text.indexOf(a.original) - text.indexOf(b.original));
  const parts = [];
  let remaining = text;
  let offset = 0;
  const used = new Set();
  for (const err of sorted) {
    if (!err.original || used.has(err.original)) continue;
    const idx = remaining.indexOf(err.original);
    if (idx === -1) continue;
    used.add(err.original);
    if (idx > 0) parts.push({type:'text', content:remaining.slice(0,idx)});
    parts.push({type:'error', content:err.original, errorType:err.tipo||err.type, error:err});
    remaining = remaining.slice(idx + err.original.length);
  }
  if (remaining) parts.push({type:'text', content:remaining});
  return parts;
}

function errClass(tipo) {
  const t = (tipo||'').toLowerCase();
  if (t.includes('gram')) return 'err-grammar';
  if (t.includes('vocab')) return 'err-vocabulary';
  if (t.includes('ortog')||t.includes('spell')) return 'err-spelling';
  if (t.includes('puntu')||t.includes('punct')) return 'err-punctuation';
  if (t.includes('estilo')||t.includes('style')) return 'err-style';
  return 'err-grammar';
}

function errTagClass(tipo) {
  const t = (tipo||'').toLowerCase();
  if (t.includes('gram')) return 'err-tag-grammar';
  if (t.includes('vocab')) return 'err-tag-vocabulary';
  if (t.includes('ortog')||t.includes('spell')) return 'err-tag-spelling';
  if (t.includes('puntu')||t.includes('punct')) return 'err-tag-punctuation';
  if (t.includes('estilo')||t.includes('style')) return 'err-tag-style';
  return 'err-tag-grammar';
}

function scoreColor(s) {
  if (s>=7) return 'var(--green)';
  if (s>=5) return 'var(--amber)';
  return 'var(--red)';
}

/* ── AnnotatedText ───────────────────────────── */
function AnnotatedText({text, errors}) {
  const [tooltip, setTooltip] = useState(null);
  const parts = buildAnnotatedText(text, errors);
  const tipos = [...new Set((errors||[]).map(e=>e.tipo||e.type).filter(Boolean))];

  const legMap = {
    'Gramática':'leg-g','gramática':'leg-g','grammar':'leg-g',
    'Vocabulario':'leg-v','vocabulario':'leg-v','vocabulary':'leg-v',
    'Ortografía':'leg-s','ortografía':'leg-s','spelling':'leg-s',
    'Puntuación':'leg-p','puntuación':'leg-p','punctuation':'leg-p',
    'Estilo':'leg-st','estilo':'leg-st','style':'leg-st',
  };
  const dotColor = {
    'leg-g':'#E24B4A','leg-v':'#EF9F27','leg-s':'#378ADD','leg-p':'#7F77DD','leg-st':'#639922'
  };

  return (
    <div>
      <div className="annotated-text">
        {parts.map((p,i) => {
          if (p.type==='text') return <span key={i}>{p.content}</span>;
          const cls = errClass(p.errorType);
          return (
            <span key={i} className={cls}
              title={`${p.error.correcto||p.error.correction} — ${p.error.explicacion||p.error.explanation||''}`}
            >{p.content}</span>
          );
        })}
      </div>
      {tipos.length > 0 && (
        <div className="legend">
          {tipos.map((t,i) => {
            const lc = legMap[t] || 'leg-g';
            const dc = dotColor[lc] || '#E24B4A';
            return (
              <div key={i} className={`leg ${lc}`}>
                <div className="leg-dot" style={{background:dc}}></div>
                {t}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── CriteriaBar ─────────────────────────────── */
function CriteriaBar({name, score}) {

    'Gramática':'#E24B4A','Vocabulario':'#1D6FA4','Ortografía':'#639922',

      <div className="crit-val">{Number(score||0).toFixed(1)}</div>

}

/* ── Result ──────────────────────────────────── */
function Result({result, writingText, feedbackLang, studentName, writingType, modeLabel, onReset}) {
  const score      = result.nota ?? result.overallScore ?? result.finalScore ?? 0;
  const criteria   = result.criterios ? Object.entries(result.criterios).map(([k,v])=>({name:k,score:v})) : (result.categories||[]);
  const errors     = result.errores || result.errors || [];
  const feedback   = result.feedback_alumno || result.studentFeedback || '';
  const summary    = result.comentario_profesor || result.summary || '';
  const strengths  = result.strengths || [];
  const improvements = result.improvements || [];

  function exportCSV() {
    const rows = [
      ['Nombre','Tipo','Nivel','Nota','Fecha'].join(','),
      [studentName||'—',writingType||'—',modeLabel||'—',score.toFixed(1),new Date().toLocaleDateString('es-ES')].join(','),
    ];
    const blob = new Blob(['\ufeff'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');a.href=url;a.download='writingcorrect_'+Date.now()+'.csv';a.click();
    URL.revokeObjectURL(url);
  }

  function exportiDoceo() {
    // iDoceo acepta CSV con columnas: Nombre, Nota, Comentario, Fecha
    const comment = [summary, feedback].filter(Boolean).join(' | ').replace(/,/g,' ');
    const rows = [
      ['Name','Score','Comment','Date'].join(','),
      [studentName||'Alumno',score.toFixed(1),`"${comment}"`,new Date().toLocaleDateString('es-ES')].join(','),
    ];
    const blob = new Blob(['\ufeff'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');a.href=url;a.download='idoceo_'+Date.now()+'.csv';a.click();
    URL.revokeObjectURL(url);
  }

  function printPDF() {
    const criteriaHtml = criteria.map(c=>{
      const colors={'Gramática':'#E24B4A','Vocabulario':'#1D6FA4','Ortografía':'#639922','Coherencia':'#1D6FA4','Adecuación':'#854F0B'};
      const col=colors[c.name]||'#1D6FA4';
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="font-size:12px;color:#4A5C70;width:80px;flex-shrink:0">${c.name}</div>
        <div style="flex:1;height:5px;background:#D8E2EC;border-radius:3px;overflow:hidden">
          <div style="width:${(c.score||0)*10}%;height:100%;background:${col};border-radius:3px"></div>
        </div>
        <div style="font-size:12px;font-weight:600;color:#0E1E35;width:28px;text-align:right">${Number(c.score||0).toFixed(1)}</div>
      </div>`;
    }).join('');

    // Construir texto anotado para PDF (HTML con spans coloreados)
    const parts = buildAnnotatedText(writingText||'', errors);
    const annotatedHtml = parts.map(p=>{
      if (p.type==='text') return `<span>${p.content.replace(/\n/g,'<br>')}</span>`;
      const colors={'err-grammar':'#A32D2D','err-vocabulary':'#92520C','err-spelling':'#1D6FA4','err-punctuation':'#5B21B6','err-style':'#1A7F5A'};
      const cls=errClass(p.errorType);
      const col=colors[cls]||'#A32D2D';
      const border={'err-grammar':'#E24B4A','err-vocabulary':'#EF9F27','err-spelling':'#378ADD','err-punctuation':'#7F77DD','err-style':'#639922'};
      return `<span style="color:${col};border-bottom:2px solid ${border[cls]||col}" title="${(p.error.correcto||'')} — ${p.error.explicacion||''}">${p.content}</span>`;
    }).join('');

    const errorsHtml = errors.map((e,i)=>`
      <div style="background:#F5F7FA;border-radius:8px;padding:10px 12px;margin-bottom:8px;page-break-inside:avoid">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-size:9px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;background:#FCEBEB;color:#A32D2D;padding:2px 6px;border-radius:3px">${e.tipo||e.type||'Error'}</span>

        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="background:#FCEBEB;color:#A32D2D;padding:1px 6px;border-radius:3px;text-decoration:line-through;font-family:Courier New;font-size:12px">${e.original||''}</span>

        </div>
        <div style="font-size:11px;color:#4A5C70;line-height:1.4">${e.explicacion||e.explanation||''}</div>
      </div>`).join('');

    const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
      <title>Corrección — ${studentName||'Alumno'}</title>
      <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
      <style>
        @page{size:A4;margin:1.5cm}

      </style>
      </head><body><div class="container">
      <div style="background:#0E1E35;border-radius:12px;padding:22px 28px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px">WritingCorrect · Informe de corrección</div>
          <div style="font-family:'DM Serif Display',serif;font-size:20px;color:white;margin-bottom:3px">${studentName||'Alumno/a'}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6)">${writingType||''} · ${modeLabel||''} · ${new Date().toLocaleDateString('es-ES')}</div>
        </div>
        <div style="width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
          <div style="font-family:'DM Serif Display',serif;font-size:28px;color:white;line-height:1">${Number(score).toFixed(1)}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.5)">/10</div>
        </div>
      </div>
      ${summary?`<div style="background:#E8F3FB;border-left:3px solid #1D6FA4;padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:16px;font-size:13px;color:#1A2638;line-height:1.6">${summary}</div>`:''}
      <div class="two-col">

          <div style="font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#8A9BAD;margin-bottom:12px">Writing del alumno</div>
          <div style="font-size:13px;line-height:1.9;color:#1A2638">${annotatedHtml}</div>
        </div>
        <div class="col-box">
          <div style="font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#8A9BAD;margin-bottom:12px">Criterios</div>
          ${criteriaHtml}
          ${errors.length?`<div style="margin-top:14px">${errorsHtml}</div>`:''}
        </div>
      </div>
      ${feedback?`<div style="background:#E6F6EF;border:1px solid #A8DCC3;border-radius:10px;padding:14px 18px;margin-bottom:16px"><div style="font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#1A7F5A;margin-bottom:8px">Feedback para el alumno</div><div style="font-size:13px;color:#1A4A3A;line-height:1.6;font-weight:300">${feedback}</div></div>`:''}
      <div style="margin-top:32px;padding-top:12px;border-top:1px solid #D8E2EC;text-align:center;color:#8A9BAD;font-size:10px">WritingCorrect · writingcorrect.com · ${new Date().toLocaleDateString('es-ES')}</div>
      </div><script>window.onload=()=>setTimeout(()=>window.print(),500);</scr`+`ipt></body></html>`;

    const w=window.open('','_blank');
    if(w){w.document.write(html);w.document.close();}
  }

  return (
    <div className="result-wrap">
      <div className="card">
        {/* Cabecera */}
        <div className="score-header">
          <div className="score-circle">
            <div className="score-num">{Number(score).toFixed(1)}</div>
            <div className="score-den">/10</div>
          </div>
          <div className="score-info">
            <div className="score-level">{result.nivel_detectado || modeLabel || 'Resultado'}</div>
            {summary && <div className="score-summary">{summary}</div>}
          </div>
        </div>

        {/* Dos columnas */}
        <div className="result-cols">
          {/* Columna izquierda: texto anotado */}
          <div className="result-col">
            <div className="card-label">Writing del alumno</div>
            <AnnotatedText text={writingText||''} errors={errors} />
          </div>

          {/* Columna derecha: nota, criterios, errores */}
          <div className="result-col">
            <div className="card-label">Resultado</div>

            {criteria.length > 0 && (
              <div className="criteria">
                {criteria.map((c,i) => <CriteriaBar key={i} name={c.name} score={c.score} />)}
              </div>
            )}

            {(strengths.length > 0 || improvements.length > 0) && (
              <div className="points-grid">
                {strengths.length > 0 && (
                  <div className="points-card strengths">
                    <div className="points-title">Puntos fuertes</div>
                    <ul className="points-list">{strengths.map((s,i)=><li key={i}>{s}</li>)}</ul>
                  </div>
                )}
                {improvements.length > 0 && (
                  <div className="points-card improvements">
                    <div className="points-title">A mejorar</div>
                    <ul className="points-list">{improvements.map((s,i)=><li key={i}>{s}</li>)}</ul>
                  </div>
                )}
              </div>
            )}

            {errors.length > 0 && (
              <div>
                <div className="card-label" style={{marginBottom:10}}>{errors.length} error{errors.length!==1?'es':''} encontrado{errors.length!==1?'s':''}</div>
                <div className="errors-list">
                  {errors.map((e,i)=>(
                    <div key={i} className="err-item">
                      <div className="err-item-head">
                        <span className={`err-tag ${errTagClass(e.tipo||e.type)}`}>{e.tipo||e.type||'Error'}</span>
                        <span className="err-num">#{i+1}</span>
                      </div>
                      <div className="err-change">
                        <span className="err-wrong">{e.original}</span>
                        <span className="err-arrow">→</span>
                        <span className="err-right">{e.correcto||e.correction}</span>
                      </div>
                      <div className="err-expl">{e.explicacion||e.explanation}</div>
                    </div>
                  ))}

            )}

            {feedback && (
              <div className="feedback-box" style={{marginTop:errors.length?16:0}}>
                <div className="feedback-label">Feedback para el alumno</div>
                <div className="feedback-text">{feedback}</div>
              </div>
            )}
          </div>
        </div>

        {/* Acciones */}
        <div className="action-row">
          <button className="action-btn primary" onClick={printPDF}>↓ Descargar PDF</button>
          <button className="action-btn" onClick={exportiDoceo}>iDoceo CSV</button>
          <button className="action-btn" onClick={exportCSV}>CSV genérico</button>
          <button className="action-btn" onClick={onReset}>Nueva corrección</button>
        </div>
      </div>
    </div>
  );
}

/* ── Upgrade Modal ───────────────────────────── */
function UpgradeModal({onClose, user, reason}) {
  const [loading, setLoading] = useState(null);
  async function handleUpgrade(plan) {
    setLoading(plan);
    try {
      const res = await fetch('/api/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan,email:user?.email||'',userId:user?.id||''})});
      const data = await res.json();
      if (data.url) window.location.href=data.url;
      else alert('Error Stripe: '+(data.error||'Inténtalo de nuevo'));
    } catch(e){alert('Error: '+e.message);}
    finally{setLoading(null);}
  }
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Mejora tu plan</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {reason && <div className="error-box" style={{marginBottom:16}}>{reason}</div>}
          <div className="plan-grid">
            {[['basic','Básico','6,99€','80 correcciones · PDF · iDoceo'],['teacher','Profesor','9,99€','250 correcciones · PDF completo · iDoceo'],['center','Centro','39€','Ilimitado · 5 profesores']].map(([id,name,price,desc])=>(
              <div key={id} className={`plan-card${id==='teacher'?' featured':''}`} onClick={()=>handleUpgrade(id)} style={{opacity:loading&&loading!==id?0.5:1}}>
                {id==='teacher'&&<div style={{fontSize:11,fontWeight:600,color:'var(--accent)',marginBottom:6}}>MÁS POPULAR</div>}
                <div className="plan-name">{name}</div>
                <div className="plan-price">{price} <span>/mes</span></div>
                <div className="plan-desc">{desc}</div>
                {loading===id&&<div style={{fontSize:12,color:'var(--accent)',marginTop:8}}>Redirigiendo a Stripe…</div>}
              </div>
            ))}
          </div>
          <p style={{fontSize:12,color:'var(--mist)',marginTop:16,textAlign:'center'}}>Pago seguro con Stripe · Cancela cuando quieras</p>
        </div>
      </div>
    </div>
  );
}

/* ── Auth ────────────────────────────────────── */
function Auth({onLogin}) {
  const [tab,setTab]       = useState('login');
  const [name,setName]     = useState('');
  const [email,setEmail]   = useState('');
  const [pass,setPass]     = useState('');
  const [center,setCenter] = useState('');
  const [err,setErr]       = useState('');
  const [ok,setOk]         = useState('');
  const [busy,setBusy]     = useState(false);

  async function submit() {
    setErr('');setOk('');
    if (!email.includes('@')) return setErr('Email inválido.');
    if (pass.length<6) return setErr('La contraseña debe tener al menos 6 caracteres.');
    if (tab==='register'&&!name.trim()) return setErr('Introduce tu nombre.');
    if (!sb) return setErr('Error de configuración. Contacta con soporte.');
    setBusy(true);
    try {
      if (tab==='register') {
        const {data,error} = await sb.auth.signUp({email,password:pass});
        if (error) throw error;
        const userId = data.user?.id;
        if (!userId) throw new Error('No se pudo crear el usuario.');
        const profile = await createProfile(userId,{name:name.trim(),center:center.trim()});
        if (data.session) onLogin({...profile,email});
        else setOk('¡Cuenta creada! Revisa tu email para confirmarla y vuelve a entrar.');
      } else {
        const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
        if (error) {
          if (error.message.includes('Invalid login')) throw new Error('Email o contraseña incorrectos.');
          if (error.message.includes('Email not confirmed')) throw new Error('Confirma tu email antes de entrar.');
          throw error;
        }
        const profile = await getProfile(data.user.id);
        onLogin({...profile,email});
      }
    } catch(e){setErr(e.message||'Error desconocido.');}
    finally{setBusy(false);}
  }

  return (
    <div className="app-wrap">
      <div className="auth-wrap">
        <div className="auth-brand-panel">
          <div className="auth-brand-top">
            <div className="auth-brand-logo">
              <div className="auth-brand-mark">✏️</div>
              <div className="auth-brand-name">Writing<span>Correct</span></div>
            </div>
            <div className="auth-tagline">Corrige writings con <em>precisión,</em> en segundos</div>
            <div className="auth-tagline-sub">La herramienta que los profesores de inglés estaban esperando.</div>
          </div>
          <div className="auth-features">
            {[['✦','Nota sobre 10 y criterios MCER','De A1 a C2 o por curso de ESO y Bachillerato'],['✦','Errores numerados y explicados','Gramática, vocabulario, ortografía con explicación pedagógica'],['✦','Exportación a iDoceo','CSV listo para importar directamente']].map(([icon,title,sub],i)=>(
              <div key={i} className="auth-feature">
                <div className="auth-feature-icon">{icon}</div>
                <div className="auth-feature-text"><strong>{title}</strong><span>{sub}</span></div>
              </div>
            ))}
          </div>
        </div>
        <div className="auth-form-panel">
          <div className="auth-box">
            <div className="auth-logo-wrap">
              <div className="auth-logo-mark">✏️</div>
              <div className="auth-brand">Writing<span>Correct</span></div>
            </div>
            <div className="auth-tabs">
              <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>{setTab('login');setErr('');setOk('');}}>Entrar</button>
              <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={()=>{setTab('register');setErr('');setOk('');}}>Crear cuenta</button>
            </div>
            <h2 className="auth-title">{tab==='login'?'Bienvenida de nuevo':'Crea tu cuenta'}</h2>
            <p className="auth-sub">{tab==='login'?'Accede a tu corrector de writings.':'5 correcciones gratuitas para empezar.'}</p>
            {err&&<div className="auth-err">{err}</div>}
            {ok&&<div className="auth-ok">{ok}</div>}
            {tab==='register'&&<div className="field"><label>Nombre</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre" /></div>}
            <div className="field"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" /></div>
            <div className="field"><label>Contraseña</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••" onKeyDown={e=>e.key==='Enter'&&submit()} /></div>
            {tab==='register'&&<div className="field"><label>Centro <span style={{fontWeight:300,textTransform:'none',letterSpacing:0}}>(opcional)</span></label><input value={center} onChange={e=>setCenter(e.target.value)} placeholder="IES Nombre" /></div>}
            <button className="btn-full" onClick={submit} disabled={busy}>{busy?'Un momento…':tab==='login'?'Entrar':'Crear cuenta gratis'}</button>
            <div className="auth-switch">
              {tab==='login'?<>¿No tienes cuenta? <a onClick={()=>{setTab('register');setErr('');setOk('');}}>Regístrate</a></>:<>¿Ya tienes cuenta? <a onClick={()=>{setTab('login');setErr('');setOk('');}}>Entra aquí</a></>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Corrector ───────────────────────────────── */
function Corrector({user, onUserChange, onLogout}) {
  const [mode,setMode]           = useState('level');
  const [level,setLevel]         = useState('B1');
  const [course,setCourse]       = useState('3º ESO');
  const [writingType,setWritingType] = useState('Redacción / Essay');
  const [inputMode,setInputMode] = useState('text');
  const [text,setText]           = useState('');
  const [images,setImages]       = useState([]);
  const [feedbackLang,setFeedbackLang] = useState('es');
  const [studentName,setStudentName] = useState('');
  const [loading,setLoading]     = useState(false);
  const [loadingStep,setLoadingStep] = useState('');
  const [result,setResult]       = useState(null);
  const [writingText,setWritingText] = useState('');
  const [error,setError]         = useState('');
  const [dragOver,setDragOver]   = useState(false);
  const [showUpgrade,setShowUpgrade] = useState(false);
  const [upgradeReason,setUpgradeReason] = useState('');
  const [showMenu,setShowMenu]   = useState(false);
  const [showHistory,setShowHistory] = useState(false);
  const [history,setHistory]     = useState([]);
  const resultRef = useRef(null);
  const fileRef   = useRef(null);

  const plan      = user.plan || 'free';
  const used      = user.corrections_used || 0;
  const limit     = PLANS[plan]?.limit ?? 5;
  const remaining = limit===Infinity ? Infinity : Math.max(0,limit-used);
  const modeLabel = mode==='level' ? 'Nivel '+level : course;

  useEffect(()=>{
    if (!sb||!user?.id) return;
    sb.from('correcciones').select('id,student_name,writing_type,mode_label,score,created_at')
      .eq('user_id',user.id).order('created_at',{ascending:false}).limit(50)
      .then(({data})=>{ if(data) setHistory(data); });
  },[result,user?.id]);

  async function handleImageFiles(files) {
    const imgs=[];
    for(const f of files){
      if(!f.type.startsWith('image/')) continue;
      const b64=await fileToBase64(f);
      imgs.push({preview:URL.createObjectURL(f),base64:b64,mediaType:f.type});
    }
    setImages(prev=>[...prev,...imgs]);
  }

  async function correct() {
    setError('');
    if(remaining<=0){setUpgradeReason(`Has usado tus ${limit} correcciones${plan==='free'?' gratuitas':' de este mes'}.`);setShowUpgrade(true);return;}
    if(inputMode==='text'&&text.trim().length<20) return setError('El texto debe tener al menos 20 caracteres.');
    if(inputMode==='photo'&&images.length===0) return setError('Sube al menos una foto.');
    setLoading(true);setResult(null);
    try {
      let wt=text;
      if(inputMode==='photo'){
        setLoadingStep('Leyendo el writing…');
        const r=await fetch('/api/correct',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:'__transcribe__',images:images.map(i=>({base64:i.base64,mediaType:i.mediaType}))})});
        const d=await r.json();
        wt=d.transcription||d.texto||'';
        if(!wt||wt.length<10){setError('No se pudo leer la imagen. Prueba con una foto más nítida.');setLoading(false);setLoadingStep('');return;}
      }
      setWritingText(wt);
      setLoadingStep('Analizando y corrigiendo…');
      const res=await fetch('/api/correct',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:wt,nivel:mode==='level'?level:null,curso:mode==='course'?course:null,idioma_feedback:feedbackLang})});
      const data=await res.json();
      if(data.error) throw new Error(data.error);
      setResult(data);

      // Guardar en Supabase
      if(sb){
        await sb.from('correcciones').insert([{user_id:user.id,student_name:studentName||'Alumno/a',writing_type:writingType,mode_label:modeLabel,score:data.nota??data.overallScore??0,result:data,transcribed_text:wt,feedback_lang:feedbackLang}]);
        const {data:updated}=await sb.from('profiles').update({corrections_used:used+1}).eq('id',user.id).select().single();
        if(updated) onUserChange({...user,corrections_used:updated.corrections_used});
      }
      setTimeout(()=>resultRef.current?.scrollIntoView({behavior:'smooth',block:'start'}),150);
    } catch(e){setError('Error: '+(e.message||'Inténtalo de nuevo'));}
    finally{setLoading(false);setLoadingStep('');}
  }

  async function logout(){
    if(confirm('¿Cerrar sesión?')){
      if(sb) await sb.auth.signOut();
      onLogout();
    }
  }

  const usedPct    = limit===Infinity?0:Math.min(100,(used/limit)*100);
  const limitColor = remaining>limit*0.3?'var(--accent)':remaining>0?'var(--amber)':'var(--red)';

  return (
    <div className="app-wrap">
      <nav>
        <a href="/" className="logo">
          <div className="logo-mark">✏️</div>
          <span className="logo-text">Writing<span>Correct</span></span>
        </a>
        <div className="nav-right">
          {limit!==Infinity&&(
            <div className="nav-pill">
              <span className="usage-dot" style={{background:limitColor}}></span>
              {remaining} / {limit}
            </div>
          )}
          <div className="lang-toggle">
            <button className={`lang-btn ${feedbackLang==='es'?'active':''}`} onClick={()=>setFeedbackLang('es')}>🇪🇸 ES</button>
            <button className={`lang-btn ${feedbackLang==='en'?'active':''}`} onClick={()=>setFeedbackLang('en')}>🇬🇧 EN</button>
          </div>
          <button className="nav-btn" onClick={()=>setShowHistory(true)}>Historial</button>
          {plan!=='center'&&<button className="nav-btn-primary" onClick={()=>{setUpgradeReason('');setShowUpgrade(true);}}>{plan==='free'?'Hazte Pro':'Mejorar plan'}</button>}
          <div style={{position:'relative'}}>
            <button className="avatar" onClick={()=>setShowMenu(!showMenu)}>{((user.name||'?')[0]).toUpperCase()}</button>
            {showMenu&&(
              <div className="dropdown" onMouseLeave={()=>setShowMenu(false)}>
                <div className="dropdown-header">
                  <div className="dropdown-name">{user.name}</div>
                  <div className="dropdown-email">{user.email}</div>
                  <div className="dropdown-plan">{PLANS[plan]?.name}</div>
                </div>
                <button className="dropdown-item" onClick={logout}>Cerrar sesión</button>
              </div>
            )}
          </div>
        </div>
      </nav>

      <div className="app-main">
        <div className="section-top">
          <div className="tag">Bienvenida, {(user.name||'').split(' ')[0]}</div>
          <h1 className="page-title">Corrige writings con <em style={{fontStyle:'italic',color:'var(--accent)'}}>precisión</em></h1>
          <p className="page-sub">Pega el texto o sube una foto. Nota, errores y feedback listos en segundos.</p>
        </div>

        {limit!==Infinity&&(
          <div className="limit-bar-wrap">
            <div className="limit-bar-top">
              <span className="limit-bar-label">Correcciones este mes</span>
              <span className="limit-bar-count">{used} de {limit}</span>
            </div>
            <div className="limit-bar"><div className="limit-bar-fill" style={{width:usedPct+'%',background:limitColor}}></div></div>
          </div>
        )}

        {!result&&!loading&&(
          <div className="card">
            <div className="card-section">
              <div className="card-label">Modo de corrección</div>
              <div className="mode-tabs">
                <button className={`mode-tab ${mode==='level'?'active':''}`} onClick={()=>setMode('level')}>Por nivel MCER</button>
                <button className={`mode-tab ${mode==='course'?'active':''}`} onClick={()=>setMode('course')}>Por curso</button>
              </div>
              <div className="select-group">
                {mode==='level'?(
                  <div className="select-wrap"><label>Nivel MCER</label><select value={level} onChange={e=>setLevel(e.target.value)}>{LEVELS.map(l=><option key={l}>{l}</option>)}</select></div>
                ):(
                  <div className="select-wrap"><label>Curso</label><select value={course} onChange={e=>setCourse(e.target.value)}>{COURSES.map(c=><option key={c}>{c}</option>)}</select></div>
                )}
                <div className="select-wrap"><label>Tipo de writing</label><select value={writingType} onChange={e=>setWritingType(e.target.value)}>{WRITING_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.8px',textTransform:'uppercase',color:'var(--slate)',marginBottom:6,display:'block'}}>Alumno/a <span style={{fontWeight:300,textTransform:'none',letterSpacing:0}}>(opcional)</span></label>
                <input style={{padding:'10px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontFamily:'var(--sans)',fontSize:14,color:'var(--ink)',outline:'none',width:'100%',maxWidth:320,transition:'border-color 0.2s'}} value={studentName} onChange={e=>setStudentName(e.target.value)} placeholder="Nombre del alumno" onFocus={e=>e.target.style.borderColor='var(--accent)'} onBlur={e=>e.target.style.borderColor='var(--border)'} />
              </div>
            </div>

            <div className="card-section">
              <div className="card-label">Writing del alumno</div>
              <div className="input-toggle">
                <button className={`input-btn ${inputMode==='text'?'active':''}`} onClick={()=>setInputMode('text')}>✏️ Texto</button>
                <button className={`input-btn ${inputMode==='photo'?'active':''}`} onClick={()=>setInputMode('photo')}>📷 Foto</button>
              </div>
              {inputMode==='text'?(
                <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Pega aquí el texto del writing del alumno, respetando los errores originales…" />
              ):(
                <div>
                  <div className={`drop-zone ${dragOver?'over':''}`} onClick={()=>fileRef.current?.click()} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);handleImageFiles(Array.from(e.dataTransfer.files));}}>
                    <div className="drop-icon">📄</div>
                    <div className="drop-text">Arrastra la foto aquí o haz clic</div>
                    <div className="drop-hint">JPG, PNG — varias páginas permitidas</div>
                  </div>
                  <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>handleImageFiles(Array.from(e.target.files))} />
                  {images.length>0&&(
                    <div className="img-previews">
                      {images.map((img,i)=>(
                        <div key={i} className="img-preview">
                          <img src={img.preview} alt="" />
                          <button className="img-remove" onClick={()=>setImages(prev=>{URL.revokeObjectURL(prev[i].preview);return prev.filter((_,j)=>j!==i)})}>×</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            <div className="card-section">
              {error&&<div className="error-box">{error}</div>}
              <button className="correct-btn" onClick={correct} disabled={remaining<=0}>
                {remaining<=0?'Sin correcciones disponibles':'✦ Corregir writing'}
              </button>
              {remaining<=0&&<div style={{textAlign:'center',marginTop:10}}><a style={{fontSize:13,color:'var(--accent)',cursor:'pointer'}} onClick={()=>setShowUpgrade(true)}>Ampliar plan →</a></div>}
            </div>
          </div>
        )}

        {loading&&(
          <div className="card"><div className="loading-wrap">
            <div className="loading-spinner"></div>
            <div className="loading-text">Corrigiendo el writing…</div>
            <div className="loading-sub">{loadingStep||'Esto tarda unos segundos.'}</div>
          </div></div>
        )}

        {result&&(
          <div ref={resultRef}>
            <Result result={result} writingText={writingText} feedbackLang={feedbackLang}
              studentName={studentName||'Alumno/a'} writingType={writingType} modeLabel={modeLabel}
              onReset={()=>{setResult(null);setText('');setImages([]);setStudentName('');setWritingText('');window.scrollTo({top:0,behavior:'smooth'});}}
            />
          </div>
        )}
      </div>

      {/* Modal historial */}
      {showHistory&&(
        <div className="modal-overlay" onClick={()=>setShowHistory(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:540}}>
            <div className="modal-header"><div className="modal-title">Historial</div><button className="modal-close" onClick={()=>setShowHistory(false)}>×</button></div>
            <div className="modal-body">
              {history.length===0?<p style={{color:'var(--mist)',fontSize:14,textAlign:'center',padding:'20px 0'}}>Todavía no hay correcciones.</p>
              :history.map((h,i)=>(
                <div key={h.id||i} className="history-item">
                  <div>
                    <div className="history-name">{h.student_name}</div>
                    <div className="history-meta">{h.writing_type} · {h.mode_label} · {new Date(h.created_at).toLocaleDateString('es-ES')}</div>
                  </div>
                  <div className="history-score">{Number(h.score||0).toFixed(1)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {showUpgrade&&<UpgradeModal onClose={()=>setShowUpgrade(false)} user={user} reason={upgradeReason} />}
    </div>
  );
}

/* ── App root ────────────────────────────────── */
function App() {
  const [user,setUser]     = useState(null);
  const [booting,setBooting] = useState(true);

  useEffect(()=>{
    if (!sb) { setBooting(false); return; }
    const {data:{subscription}} = sb.auth.onAuthStateChange(async(event,session)=>{
      if (session?.user) {
        try {
          const profile=await getProfile(session.user.id);
          setUser({...profile,email:session.user.email});
        } catch { setUser(null); }
      } else { setUser(null); }
      setBooting(false);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  if (booting) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div className="loading-spinner" style={{margin:0}}></div>
    </div>
  );

  if (!user) return <Auth onLogin={setUser} />;
  return <Corrector user={user} onUserChange={setUser} onLogout={()=>setUser(null)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
